name: CI

on: [push]

jobs:
  sast_scan:
    name: run Bandit scan
    runs-on : ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: set up python
      uses: action/setup-python@v2
      with:
        python-version: 3.8

    - name: install Bandit
      run: pip install bandit

    - name : run Bandit scan
      run: bandit -r .
      
    
